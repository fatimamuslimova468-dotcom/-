<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подтверждение оплаты</title>
  <meta http-equiv="refresh" content="2;url=/" />
  <style>
    body { font-family: Inter, sans-serif; text-align: center; padding: 40px; background: #f4f7fc; }
    .spinner { border: 4px solid #e0e7f0; border-top: 4px solid #f0a030; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Проверяем оплату...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const invoiceId = params.get('invoice_id');
    const status = params.get('status');

    if (status === 'paid' || status === 'success') {
      localStorage.setItem('payment_verified', 'true');
      localStorage.setItem('paid_invoice', invoiceId || '');
      redirect();
    } else if (invoiceId) {
      checkInvoiceStatus(invoiceId);
    } else {
      redirect();
    }

    async function checkInvoiceStatus(invoiceId) {
      try {
        const response = await fetch(`https://api.lava.ru/invoice/${invoiceId}`, {
          headers: { 'Authorization': 'Bearer 1f20c4a6-ff03-4628-86c2-7dab1ad09db5' }
        });
        const data = await response.json();
        if (data.status === 'paid' || data.status === 'success') {
          localStorage.setItem('payment_verified', 'true');
          localStorage.setItem('paid_invoice', invoiceId);
        }
      } catch (e) {
        localStorage.setItem('payment_verified', 'true');
      }
      redirect();
    }

    function redirect() {
      setTimeout(() => {
        window.location.href = '/';
      }, 1500);
    }
  </script>
</body>
</html>
